{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Set New Password | Ghantey</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <a class="brand" href="/">Ghantey</a>
            <h1>Set new password</h1>
            {% if validlink %}
                <form method="post" class="auth-form">{% csrf_token %}{{ form.as_p }}<button type="submit">Save password</button></form>
            {% else %}
                <p>This reset link is invalid or expired.</p>
                <a class="auth-button-link" href="/accounts/password-reset/">Request a new link</a>
            {% endif %}
        </section>
    </main>
</body>
</html>
