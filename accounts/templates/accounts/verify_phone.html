{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify Phone | Ghantey</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <a class="brand" href="/">Ghantey</a>
            <h1>Verify Phone</h1>
            {% if messages %}
                <div class="messages">
                    {% for msg in messages %}
                        <div class="msg {{ msg.tags }}">{{ msg }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            <p>Enter the 6-digit code sent to your phone (for MVP, check the messages above).</p>
            <form method="post" class="auth-form">
                {% csrf_token %}
                <div class="form-field">
                    <label for="code">Verification code</label>
                    <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required placeholder="000000">
                </div>
                <button type="submit">Verify</button>
            </form>
            <a href="/accounts/send-phone-verification/" class="auth-switch">Resend code</a>
            <p class="auth-switch"><a href="/accounts/dashboard/">Back to Dashboard</a></p>
        </section>
    </main>
</body>
</html>
